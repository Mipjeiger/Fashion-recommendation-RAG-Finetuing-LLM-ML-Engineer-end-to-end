version: "3.9"

services:
  fastapi:
    build:
      context: ./website/app/backend
      dockerfile: Dockerfile
    container_name: indocloth-fastapi
    ports:
      - "8030:8030"
    env_file:
      - .env
    environment: # Environment runs outside docker container, use host.docker.internal instead
      # Postgresql
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/${DB_NAME}
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      # MLflow
      MLFLOW_TRACKING_URI: http://host.docker.internal:5020
      # Inference service
      INFERENCE_SERVICE_URL: http://host.docker.internal:8000/inference
      ML_SERVICE_URL: http://host.docker.internal:8000
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux compatibility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - indocloth-network

  minio:
    image: minio/minio:latest
    container_name: indocloth-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - indocloth-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: indocloth-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./MLOps/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux compatibility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - indocloth-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: indocloth-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/indocloth.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./MLOps/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./MLOps/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - indocloth-network

volumes:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  indocloth-network:
    driver: bridge