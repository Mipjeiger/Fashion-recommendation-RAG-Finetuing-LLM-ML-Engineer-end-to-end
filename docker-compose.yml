services:
  postgres:
    image: postgres:13-alpine
    container_name: indocloth-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - indocloth-network
    restart: unless-stopped

  fastapi:
    build:
      context: ./website/app/backend
      dockerfile: Dockerfile
    container_name: indocloth-FastAPI
    ports:
      - "8030:8030"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      ML_SERVICE_URL: http://inference-service:8000
      INFERENCE_SERVICE_URL: http://inference-service:8000
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      MODEL_BASE_PATH: /app/models
      STATIC_IMAGES_DIR: /app/fashion_images/dataset_clean
    volumes:
      - ./fashion_images/dataset_clean:/app/fashion_images/dataset_clean:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - indocloth-network
    restart: unless-stopped

  inference-service:
    build:
      context: ./website/api/fastapi_app
      dockerfile: ../../docker/fastapi.Dockerfile
    container_name: indocloth-inference-service
    environment:
      MODEL_PATH: /app/models
      OMP_NUM_THREADS: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./MLOps/models:/app/models:ro
    networks:
      - indocloth-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: indocloth-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - indocloth-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: indocloth-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./MLOps/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - indocloth-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: indocloth-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/indocloth.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./MLOps/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./MLOps/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - indocloth-network
    restart: unless-stopped

volumes:
  minio_data:
  prometheus_data:
  grafana_data:
  postgres_data:

networks:
  indocloth-network:
    driver: bridge