version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: indocloth-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432" # 5433 as host port : 5432 as container port
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -h localhost -p ${DB_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - indocloth-network

  # Backend API
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: indocloth-backend-API
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      INFERENCE_SERVICE_URL: http://inference-service:8000/inference
      MODEL_BASE_PATH: /app/models
      DEBUG: "false"
      ENVIRONMENT: production
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    ports:
      - "8030:8030"
    volumes:
      - ../MLOps/models:/app/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8030/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - indocloth-network

  # FastAPI Inference Service (existing)
  inference-service:
    build:
      context: ../api/fastapi_app
      dockerfile: ../../docker/fastapi.Dockerfile
    container_name: indocloth-inference
    environment:
      MODEL_PATH: /app/models
    ports:
      - "8000:8000"
    volumes:
      - ../MLOps/models:/app/models:ro
    networks:
      - indocloth-network

  # Frontend
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: indocloth-frontend
    ports:
      - "4020:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8030/api/v1
    networks:
      - indocloth-network

volumes:
  postgres_data:

networks:
  indocloth-network:
    driver: bridge
